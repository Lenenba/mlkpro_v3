name: quality

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  laravel-quality:
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      CACHE_STORE: array
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      MAIL_MAILER: array
      PULSE_ENABLED: "false"
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      TELESCOPE_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, gd, intl, pdo_sqlite, sqlite3
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Check PHP formatting
        run: composer qa:format

      - name: Run static analysis
        run: composer qa:analyse

      - name: Run test suite
        run: composer qa:test

      - name: Build frontend assets
        run: npm run qa:build
